<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>unitz - Unit Conversion Calculator</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --green: #3fb950;
      --red: #f85149;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1rem;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--accent);
    }

    .subtitle {
      color: var(--text-muted);
      margin-top: 0.25rem;
      font-size: 1rem;
    }

    main { flex: 1; }

    .input-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.75rem 1rem;
      font-size: 1.1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    button.convert {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button.convert:hover {
      background: var(--accent-hover);
    }

    .result, .error {
      padding: 1rem 1.25rem;
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    .result {
      background: rgba(63, 185, 80, 0.1);
      border: 1px solid rgba(63, 185, 80, 0.3);
    }

    .error {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.3);
    }

    .result .label {
      color: var(--green);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .error .label {
      color: var(--red);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .result .value {
      font-size: 1.5rem;
      font-weight: 600;
      font-family: "SF Mono", "Fira Code", "Fira Mono", monospace;
      color: var(--green);
    }

    .error .value {
      font-size: 1rem;
      color: var(--red);
    }

    .examples {
      margin-bottom: 1.5rem;
    }

    .examples h3, .history h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    button.example {
      padding: 0.4rem 0.75rem;
      font-size: 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: "SF Mono", "Fira Code", "Fira Mono", monospace;
    }

    button.example:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .history {
      margin-top: 0.5rem;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .history-item {
      font-family: "SF Mono", "Fira Code", "Fira Mono", monospace;
      font-size: 0.9rem;
      color: var(--text-muted);
      padding: 0.35rem 0;
    }

    .hist-input { color: var(--text-muted); }
    .hist-eq { color: var(--text-muted); }
    .hist-result { color: var(--green); font-weight: 600; }

    footer {
      text-align: center;
      padding: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .input-group {
        flex-direction: column;
      }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="js/main.js"></script>
</body>
</html>
