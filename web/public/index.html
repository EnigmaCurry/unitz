<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>calc - Unit Conversion Calculator</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --green: #3fb950;
      --red: #f85149;
      --header-height: 56px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      zoom: 2;
    }

    html, body, #app {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 3.5rem 0 1rem;
      gap: 0.75rem;
      z-index: 10;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    .input-wrapper {
      position: relative;
      flex: 1;
      min-width: 0;
    }

    .input-wrapper input[type="text"] {
      width: 100%;
      padding: 0.5rem 2rem 0.5rem 0.75rem;
      font-size: 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .input-wrapper input[type="text"]:focus {
      border-color: var(--accent);
    }

    .input-wrapper input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    .clear-input {
      position: absolute;
      right: 0.4rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.2rem 0.3rem;
    }

    .clear-input:hover {
      color: var(--text);
    }

    .preview-bar {
      position: sticky;
      top: -1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      padding: 0.5rem 3.5rem 0.5rem 1rem;
      margin: -1rem -1rem 0.5rem -1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      z-index: 5;
      font-family: "SF Mono", "Fira Code", "Fira Mono", monospace;
      font-size: 0.95rem;
    }

    .preview-spacer {
      flex-shrink: 0;
      font-size: 1.4rem;
      font-weight: 700;
      visibility: hidden;
    }

    .preview-answer {
      flex: 1;
      min-width: 0;
    }

    .preview-result {
      color: var(--green);
      font-weight: 600;
    }

    .preview-error {
      color: var(--red);
      font-size: 0.85rem;
    }

    button.convert {
      padding: 0.4rem 0.75rem;
      font-size: 0.9rem;
      font-weight: 600;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    button.convert:hover {
      background: var(--accent-hover);
    }

    button.menu-btn {
      position: fixed;
      top: 11px;
      right: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 34px;
      height: 34px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
      z-index: 30;
    }

    button.menu-btn:hover {
      border-color: var(--accent);
    }

    .hamburger {
      display: block;
      width: 16px;
      height: 2px;
      background: var(--text-muted);
      border-radius: 1px;
      transition: background 0.15s;
    }

    button.menu-btn:hover .hamburger {
      background: var(--accent);
    }

    .menu-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 40;
    }

    nav.menu {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 50vw;
      max-width: 280px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 50;
      display: flex;
      flex-direction: column;
      padding: 0.5rem 0 1rem;
      overflow-y: auto;
    }

    .menu-item {
      display: block;
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      background: none;
      border: none;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }

    .menu-item:hover {
      background: var(--bg);
    }

    main {
      position: fixed;
      top: var(--header-height);
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: auto;
      padding: 1rem;
    }

    .log {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .log-entry {
      font-family: "SF Mono", "Fira Code", "Fira Mono", monospace;
      font-size: 0.95rem;
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    .log-entry.latest {
      background: var(--surface);
    }

    .log-input {
      color: var(--text-muted);
    }

    .log-result {
      color: var(--green);
      font-weight: 600;
    }

    .log-error {
      color: var(--red);
    }

    .examples {
      padding: 2rem 0;
    }

    .examples h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    button.example {
      padding: 0.4rem 0.75rem;
      font-size: 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: "SF Mono", "Fira Code", "Fira Mono", monospace;
    }

    button.example:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Help page */
    .help-page {
      max-width: 640px;
      margin: 0 auto;
      padding-bottom: 2rem;
    }

    .help-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .help-header h2 {
      font-size: 1.3rem;
      color: var(--accent);
    }

    .back-btn {
      padding: 0.3rem 0.75rem;
      font-size: 0.85rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .back-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .help-intro {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }

    .help-intro code {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.05rem 0.35rem;
      font-size: 0.85rem;
      color: var(--text);
      font-family: "SF Mono", "Fira Code", "Fira Mono", monospace;
    }

    .unit-group {
      margin-bottom: 1.5rem;
    }

    .unit-group h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.25rem;
    }

    .group-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      font-style: italic;
    }

    .unit-table {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 0.25rem 1rem;
    }

    .unit-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      padding: 0.2rem 0;
    }

    .unit-sym {
      font-family: "SF Mono", "Fira Code", "Fira Mono", monospace;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      min-width: 4.5rem;
    }

    .unit-label {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    @media (max-width: 480px) {
      header {
        gap: 0.5rem;
        padding: 0 3.5rem 0 0.5rem;
      }
      .input-wrapper input[type="text"] { font-size: 0.9rem; }
      html { zoom: 1.5; }
      .preview-bar { padding: 0.5rem 1rem; }
      .preview-spacer { display: none; }
      header:has(.input-wrapper input:focus) {
        padding: 0 0.5rem;
      }
      header:has(.input-wrapper input:focus) h1,
      header:has(.input-wrapper input:focus) .menu-btn {
        display: none;
      }
    }

    /* Light theme */
    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #656d76;
      --accent: #0969da;
      --accent-hover: #0550ae;
      --green: #1a7f37;
      --red: #cf222e;
    }

    [data-theme="light"] .menu-overlay {
      background: rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="js/main.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>
</body>
</html>
